<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>Document</title>
    <link
      rel="preload"
      as="image"
      href="img/coolpinky_vesitorni.avif"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="img/coolpinky_ulkona.avif"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="img/pinky_poydalla.avif"
      fetchpriority="high"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #111;
        --color: rgba(255, 255, 255, 0.9);
        --color-subtle: rgba(255, 255, 255, 0.75);
        --primary: rgb(41, 104, 214);
        --pink: #dc6f95;
        --bg-inverse: seashell;
        --bg-inverse-hover: rgb(209, 216, 224);
        --color-inverse: rgba(23, 23, 23, 0.9);
        --font-sans:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --header-height: 50px;
        --radius: 1rem;
        --section-padding: 1rem;
        --container-width: 1280px;
        --color-border: rgba(237, 239, 242, 0.25);
        --color-border-subtle: rgba(237, 239, 242, 0.15);
        --bg-card: linear-gradient(
          rgba(185, 213, 255, 0.05),
          rgba(185, 213, 255, 0.02)
        );
      }

      /* @media (prefers-color-scheme: light) {
        :root {
          --bg: rgb(237, 239, 242);
          --color: rgba(23, 23, 23, 0.9);
          --color-subtle: rgba(24, 24, 24, 0.75);
          --bg-inverse: #111;
          --color-inverse: rgba(255, 255, 255, 0.9);
        }
      } */

      html {
        color-scheme: dark light;
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        color: var(--color);
        line-height: 1.6;
        min-height: 100svh;
        letter-spacing: 0.04em;
        font-weight: normal;
        font-optical-sizing: auto;
        text-shadow: 2px 3px 5px rgba(0, 0, 0, 0.35);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        -webkit-text-size-adjust: 100%;
      }

      section {
        width: 100%;
        padding: var(--section-padding);
      }

      img,
      video,
      svg {
        display: block;
        max-width: 100%;
        height: auto;
      }

      p,
      h1,
      h2,
      h3,
      h4 {
        overflow-wrap: break-word;
      }

      h1,
      h2,
      h3,
      h4 {
        text-wrap: balance;
        letter-spacing: normal;
        line-height: 1.2;
        color: var(--color);
        padding-bottom: 0.75em;
      }

      p {
        color: var(--color-subtle);
        text-wrap: pretty;
        max-width: 1000px;
      }

      a {
        color: var(--primary);
        text-decoration: none;
        font-weight: initial;
      }

      a:hover {
        text-decoration: underline;
      }

      ul,
      ol {
        list-style: none;
      }

      button {
        all: unset;
        cursor: pointer;
        font: inherit;
        font-weight: initial;
        font-size: initial;
        background-color: #dc6f95;
        background-color: var(--bg-inverse);
        padding: 0.5rem 1rem;
        color: black;
        border-radius: 8px;
        transition: background-color 0.1s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 100px;
        padding-bottom: 0;
        padding: 0.5rem 1rem;
        padding-bottom: 0.6rem;
        text-shadow: none;
      }

      button:hover {
        background-color: #cf678b;
        background-color: var(--bg-inverse-hover);
      }

      input,
      textarea,
      select {
        font: inherit;
      }

      .container {
        width: 100%;
        max-width: var(--container-width);
        margin: 0 auto;
      }

      header {
        width: 100%;
        height: var(--header-height);
        position: fixed;
        top: 0;
        z-index: 1000;
        background-color: var(--bg);
      }

      .header-content {
        height: 100%;
        width: 100%;
        max-width: 1280px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      header ul {
        display: flex;
        gap: 1rem;
      }

      header a {
        height: 100%;
        padding: 0.5rem 1rem;
      }

      .hero {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding-top: var(--header-height);
        background-image: url("svg/circle-medium.svg");
        background-size: contain;
      }

      .hero-upper {
        height: 35svh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding-top: 1.5rem;
      }

      .hero-below {
        height: 75svh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        padding-bottom: 7rem;
      }

      /* .hero-below-pill {
  border: 0.5px solid var(--color-border);
  font-weight: initial;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 100px;
  padding-bottom: 0;
  padding: 0.5rem 1rem;
  padding-bottom: 0.6rem;
  background-color: rgba(17, 17, 17, 0.5);
} */
      .hero-below-card {
        background: rgba(38, 94, 114, 0.6);
        background: var(--bg-card);
        background: linear-gradient(
          rgba(25, 25, 25, 0.5),
          rgba(17, 17, 17, 0.5)
        );
        backdrop-filter: blur(4px);
        display: flex;
        border-radius: 24px;
        max-width: 777px;
        padding: 1.5rem 2rem;
        border: 0.5px solid var(--color-border);
        /* transform: rotateX(10deg); */
      }

      .hero-images-grid {
        display: grid;
        gap: 1rem;
        max-width: 1333px;
      }

      .hero-img-card-container {
        position: relative;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 3px 5px 30px -9px rgba(0, 0, 0, 1);
      }

      .hero-img-card-container img {
        width: 100%;
        height: auto;
        object-fit: cover;
      }

      .hero-img-card-container::after {
        position: absolute;
        inset: 0;
        background: linear-gradient(transparent, rgba(185, 94, 109, 0.5));
        content: "";
        z-index: 10;
      }

      .big-img {
        min-height: 100svh;
        position: relative;
        background-image: url("svg/stakki.svg");
        background-size: cover;
        background-position: bottom;
      }

      .big-img img {
        border-radius: 10px;
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
      }

      .songs {
        position: relative;
        padding: 5rem 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3rem;
      }

      .songs::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;

        background-image: radial-gradient(
          circle 1.5px,
          rgba(147, 193, 219, 0.33) 100%,
          transparent 100%
        );
        background-size: 1rem 1rem;
        background-attachment: fixed;

        mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0, 0, 0, 0.15) 15%,
          rgba(0, 0, 0, 0.55) 50%,
          rgba(0, 0, 0, 0.85) 100%
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0, 0, 0, 0.15) 15%,
          rgba(0, 0, 0, 0.55) 50%,
          rgba(0, 0, 0, 0.85) 100%
        );
      }

      .song-selection {
        width: 100%;
        max-width: 1111px;
        margin: 0 auto;
        /* background: linear-gradient(transparent, rgba(185, 94, 109, 0.5)); */
        display: flex;
        flex-direction: column;
        position: relative;
        gap: 2rem;
      }

      .cover-container {
        /* background-color: var(--bg-inverse); */
        background: linear-gradient(#cfbcb7, var(--bg-inverse));
        width: 100%;
        padding: 1rem;
        border-radius: 10px;
      }
      .cover-img-container {
        /* background-color: #cfbcb7; */
      }

      .cover-img-container img {
        width: 75%;
        box-shadow: 3px 5px 23px -9px rgba(0, 0, 0, 0.65);
        aspect-ratio: 1 / 1;
        /* border-radius: var(--radius); */
      }

      .songs-vertical {
        height: fit-content;
        display: flex;
        flex-direction: column;
        padding: 2rem;
        background: linear-gradient(#111, rgb(184, 93, 125));
        border-radius: var(--radius);
        border: 0.5px solid var(--color-border);
        margin: 1rem;
      }

      .song-list ul {
        display: flex;
        flex-direction: column;
      }

      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem;
        font-weight: normal;
      }

      .song-btn {
        background-color: transparent;
        width: 100%;
        color: var(--text);
        border-radius: 10px;
        background: linear-gradient(transparent, rgba(255, 181, 207, 0.2));
        justify-content: space-between;
        border: 0.5px solid var(--color-border);
      }

      .song-btn:hover {
        background: linear-gradient(
          rgba(255, 181, 207, 0.1),
          rgba(255, 181, 207, 0.3)
        );
      }

      .song-btn img {
        opacity: 0;
        width: 20px;
      }

      .song-btn:hover img {
        opacity: 1;
      }
      /* .songs-lower {
  background-position: bottom;
 
  position: absolute;
  content: "";
  inset: 0;
  top: 50%;
  background-repeat: no-repeat;
} */

      .song-name-below {
        color: black;
        text-shadow: none;
        font-size: 1.5rem;
        padding: 2.5rem;
        padding-bottom: 0.5rem;
        text-align: right;
        color: #222;
      }

      /* Container to control layout and width */
      .audio-slider-container {
        width: 100%;
        max-width: 600px;
        padding: 10px;
        display: flex;
        align-items: center;
      }

      /* Reset default browser styles for the range slider */
      .modern-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 3px; /* Sleek, thin track */
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.15); /* Translucent track */
        outline: none;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .modern-slider:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      .modern-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--pink);
        transition:
          transform 0.1s ease,
          background-color 0.1s ease;
      }

      /* Make thumb grow slightly on hover for better user feedback */
      .modern-slider:hover::-webkit-slider-thumb {
        transform: scale(1.2);
        background: var(--pink);
      }

      /* Firefox Thumb Styles */
      .modern-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border: none;
        border-radius: 50%;
        background: var(--pink);
        transition:
          transform 0.1s ease,
          background-color 0.1s ease;
        cursor: pointer;
      }

      .modern-slider:hover::-moz-range-thumb {
        transform: scale(1.2);
        background: var(--pink);
      }

      #play-pause-btn {
        padding: 0.25rem;
        padding-bottom: 0.3rem;
        background-color: transparent;
        min-width: calc(20px + 0.5rem);
      }

      #play-pause-btn img {
        width: 20px;
      }

      .song-details {
        font-size: smaller;
        min-width: 100px;
        display: flex;
        align-items: center;
        padding-bottom: 3px;
      }

      .song-details p:first-child {
        font-weight: bold;
      }

      footer {
        display: flex;
        justify-content: center;
        align-items: center;
        padding-top: 0.5rem;
        padding-bottom: 1rem;
      }

      @media (min-width: 768px) {
        .hero-images-grid {
          grid-template-columns: repeat(3, 1fr);
        }

        .hero-img-card-container {
          aspect-ratio: 3 / 4;
        }

        .hero-img-card-container img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .hero {
          background-repeat: no-repeat;
          background-position: 200% center;
        }

        .hero-below {
          padding-bottom: 10rem;
        }

        .hero-below-card {
          font-size: larger;
          padding: 3rem 4rem;
          padding-bottom: 3.5rem;
        }
        .songs {
          padding: 8rem 0;
        }
        .song-selection {
          flex-direction: row;
          align-items: center;
        }

        .songs-vertical {
          flex-grow: 1;
          margin-bottom: 5rem;
        }

        .cover-container {
          width: 45%;
        }

        .cover-img-container img {
          width: 100%;
        }

        footer {
          padding-top: 0;
          padding-bottom: 1.5rem;
        }
      }

      @media (min-width: 1024px) {
        .hero-images-grid {
          grid-template-columns: repeat(3, 1fr);
        }

        .cover-img-container img {
          transform: translate(-3rem, 1rem);
        }
      }

      audio {
        display: none;
      }

      .player-container {
        position: sticky;
        bottom: 0;
        padding: 0.5rem;
        transform: scale(0.5);
        opacity: 0;

        transition:
          transform 150ms ease-in-out,
          opacity 150ms ease-in-out;
      }

      .player-container.active {
        transform: translateY(0);
        opacity: 1;
      }

      .player {
        background: linear-gradient(
          rgba(31, 31, 31, 0.5),
          rgba(17, 17, 17, 0.5)
        );
        background: var(--bg);
        max-width: 1000px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        padding: 0.5rem 0.75rem;
        border-radius: var(--radius);
        z-index: 1000;
        /* corner-shape: superellipse(1.5); */
        border: 0.5px solid var(--color-border-subtle);
        position: relative;
        z-index: 1000;
      }

      @media (min-width: 640px) {
      }

      @media (min-width: 768px) {
        h1 {
          font-size: 3.5rem;
          text-shadow: 2px 3px 10px rgba(0, 0, 0, 0.3);
        }

        .player-container {
          padding: 1.5rem;
        }

        .player {
          padding: 1rem 1.5rem;
        }
      }

      @media (min-width: 1024px) {
      }

      @media (min-width: 1280px) {
      }
    </style>
    <link
      rel="stylesheet"
      href="styles.css
    "
    />
    <script src="//unpkg.com/alpinejs" defer></script>
  </head>
  <body>
    <header>
      <div class="header-content">
        <nav>
          <ul>
            <li><a href="#">Link1</a></li>
            <li><a href="#">Link2</a></li>
            <li><a href="#">Link3</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main x-data="songPlayer()" x-init="init($refs.audio)">
      <section class="hero">
        <div class="hero-upper">
          <h1>Cool Pinky • Artisti</h1>
        </div>
        <div class="hero-images-grid">
          <div class="hero-img-card-container">
            <picture>
              <source type="image/avif" srcset="img/coolpinky_vesitorni.avif" />
              <source type="image/webp" srcset="img/coolpinky_vesitorni.webp" />
              <img
                src="img/coolpinky_vesitorni.avif"
                alt="coolpinkyn selfie vesitornin edessä"
                width="1200"
                height="1600"
              />
            </picture>
          </div>
          <div class="hero-img-card-container">
            <picture>
              <source type="image/avif" srcset="img/coolpinky_ulkona.avif" />
              <source type="image/webp" srcset="img/coolpinky_ulkona.webp" />
              <img
                src="img/coolpinky_ulkona.jpeg"
                alt="coolpinky ulkona yhteiskuvassa"
                width="1600"
                height="1200"
              />
            </picture>
          </div>
          <div class="hero-img-card-container">
            <picture>
              <source type="image/avif" srcset="img/pinky_poydalla.avif" />
              <source type="image/webp" srcset="img/pinky_poydalla.webp" />
              <img
                src="img/pinky_poydalla.jpeg"
                alt="coolpinky laulamassa pöydän päällä"
                width="720"
                height="956"
              />
            </picture>
          </div>
        </div>
        <div class="hero-below">
          <!-- <p class="hero-below-pill">About me</p> -->
          <div class="hero-below-card">
            Cool Pinky on Helsinkiläinen laulaja-lauluntekijä joka lokeroi
            itsensä 2026 työläisnaisenindiemusiikiksi. Cool Pinky säveltää,
            sanoittaa, sovittaa sekä äänittää ja tuottaa omat kappaleensa.
          </div>
        </div>
      </section>
      <section class="big-img">
        <div class="container">
          <picture>
            <source type="image/avif" srcset="img/coolpinky.avif" />
            <source type="image/webp" srcset="img/coolpinky.webp" />
            <img
              src="img/coolpinky.jpeg"
              alt="Coolpinky artist pose"
              width="1600"
              height="1066"
            />
          </picture>
        </div>
      </section>
      <section class="songs">
        <h2>Kappaleitani</h2>
        <div class="song-selection">
          <div class="cover-container">
            <div class="cover-img-container">
              <picture>
                <source type="image/avif" :srcset="currentSong.cover.avif" />
                <source type="image/webp" :srcset="currentSong.cover.webp" />
                <img
                  :src="currentSong.cover.jpeg"
                  :alt="currentSong.name + ' cover'"
                  width="800"
                  height="800"
                />
              </picture>
            </div>
            <div class="song-info">
              <p class="song-name-below" x-text="currentSong.name"></p>
            </div>
          </div>

          <div class="songs-vertical">
            <h3>Cool Pinky -soittolista</h3>
            <div class="song-list">
              <ul>
                <template x-for="song in songs" :key="song.id">
                  <li class="song-item">
                    <button
                      class="song-btn"
                      :class="{ 'is-active': song.id === currentSongId }"
                      @click="playSong(song)"
                    >
                      <span x-text="song.name"></span>
                      <img
                        :src="
                          isPlaying && song.id === currentSongId
                            ? 'svg/pause.svg'
                            : 'svg/play.svg'
                        "
                        alt=""
                      />
                    </button>
                  </li>
                </template>
              </ul>
            </div>
          </div>
        </div>

        <audio
          x-ref="audio"
          @play="isPlaying = true"
          @pause="isPlaying = false"
          @ended="isPlaying = false"
        ></audio>
        <div class="songs-lower"></div>
      </section>
      <section>
        <div class="container"></div>
      </section>
      <section>
        <div class="container"></div>
      </section>
      <div class="player-container" :class="{ active: isPlaying }">
        <div class="player">
          <div class="song-details">
            <p x-text="currentSong.name"></p>
          </div>
          <div class="audio-slider-container">
            <input
              type="range"
              class="modern-slider"
              min="0"
              max="100"
              value="30"
            />
          </div>

          <button id="play-pause-btn" @click="togglePlay()">
            <img
              :src="isPlaying ? 'svg/pause.svg' : 'svg/play.svg'"
              alt="play pause button image"
            />
          </button>
        </div>
      </div>
    </main>
    <footer>&copy; Cool Pinky</footer>

    <script>
      function songPlayer() {
        return {
          songs: [
            {
              id: "vastalause",
              name: "Vastalause",
              audio: "audio/vastalause.wav",
              cover: {
                avif: "img/vastalause.avif",
                webp: "img/vastalause.webp",
                jpeg: "img/vastalause.jpg",
              },
              video: null,
            },
            {
              id: "roihuvuori",
              name: "Roihuvuori",
              audio: "audio/roihuvuori.wav",
              cover: {
                avif: "img/roihuvuori.avif",
                webp: "img/roihuvuori.webp",
                jpeg: "img/roihuvuori.jpg",
              },
              video: null,
            },
            {
              id: "aurinko",
              name: "Aurinko",
              audio: "audio/aurinko.wav",
              cover: {
                avif: "img/aurinko.avif",
                webp: "img/aurinko.webp",
                jpeg: "img/aurinki.jpg",
              },
              video: null,
            },
            {
              id: "toinenpuoli",
              name: "Toinen puoli",
              audio: "audio/toinenpuoli.wav",
              cover: {
                avif: "img/toinenpuoli.avif",
                webp: "img/toinenpuoli.webp",
                jpeg: "img/toinenpuoli.jpg",
              },
              video: null,
            },
            {
              id: "vettenpaal",
              name: "Vetten pääl",
              audio: "audio/vettenpaal.wav",
              cover: {
                avif: "img/vettenpaal.avif",
                webp: "img/vettenpaal.webp",
                jpeg: "img/vettenpaal.jpg",
              },
              video: null,
            },
          ],
          currentSongId: null,
          isPlaying: false,

          get currentSong() {
            return (
              this.songs.find((s) => s.id === this.currentSongId) ??
              this.songs[0]
            );
          },

          init(audioEl) {
            this.audioEl = audioEl;
          },

          playSong(song) {
            if (this.currentSongId === song.id) {
              this.togglePlay();
              return;
            }
            this.currentSongId = song.id;
            this.audioEl.src = song.audio;
            this.audioEl.play();
          },

          togglePlay() {
            if (this.audioEl.paused) {
              this.audioEl.play();
            } else {
              this.audioEl.pause();
            }
          },
        };
      }
    </script>
  </body>
</html>
